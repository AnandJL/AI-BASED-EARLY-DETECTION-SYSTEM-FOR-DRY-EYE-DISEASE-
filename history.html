<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient History - Dry Eye System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00f5ff;
    --red: #ff2d55;
    --gold: #ffd700;
    --dark: #020c14;
    --panel: rgba(0, 245, 255, 0.04);
    --border: rgba(0, 245, 255, 0.15);
    --purple: #a855f7;
    --orange: #ff8c00;
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
    color: white;
    padding: 40px 0;
  }

  /* --- ANIMATED BACKGROUND (Same as Live Dashboard) --- */
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,100,180,0.22) 0%, transparent 65%), radial-gradient(ellipse 60% 80% at 80% 70%, rgba(0,20,80,0.3) 0%, transparent 60%), radial-gradient(ellipse 100% 100% at 50% 50%, #020c14 60%, #041825 100%); }
  .grid { position: fixed; inset: 0; z-index: 1; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .scanlines { position: fixed; inset: 0; z-index: 1; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); pointer-events: none; animation: scanMove 8s linear infinite; }
  @keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 400px; } }
  .orb { position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; animation: drift 18s ease-in-out infinite alternate; }
  .orb1 { width:400px; height:400px; top:-100px; left:-100px; background:rgba(0,180,255,0.12); animation-delay:0s; }
  .orb2 { width:350px; height:350px; bottom:-80px; right:-80px; background:rgba(255,45,85,0.10); animation-delay:-6s; }

  /* --- MAIN CONTENT --- */
  .container {
    position: relative; z-index: 10;
    width: 1000px; max-width: 95vw;
    display: flex; flex-direction: column; align-items: center;
    gap: 30px;
  }

  .header { text-align: center; width: 100%; display: flex; justify-content: space-between; align-items: center;}
  .header h1 { font-family: 'Orbitron', monospace; font-size: clamp(22px, 3vw, 32px); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
  .header h1 span { color: var(--cyan); }
  
  .nav-btn {
    padding: 10px 20px; background: rgba(0,245,255,0.1); border: 1px solid var(--cyan);
    color: var(--cyan); text-decoration: none; font-family: 'Orbitron', monospace;
    font-size: 12px; letter-spacing: 2px; border-radius: 4px; transition: all 0.3s;
  }
  .nav-btn:hover { background: var(--cyan); color: var(--dark); box-shadow: 0 0 15px var(--cyan); }

  /* --- CONTROLS --- */
  .controls {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; display: flex; gap: 20px; align-items: center;
  }
  .controls label { font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px; color: rgba(255,255,255,0.6); }
  select {
    background: rgba(0,0,0,0.5); border: 1px solid var(--cyan); color: white;
    padding: 10px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600;
    border-radius: 6px; outline: none; cursor: pointer; min-width: 250px;
  }
  select:focus { box-shadow: 0 0 10px rgba(0,245,255,0.3); }

  /* --- GRAPH & TABLE CARDS --- */
  .card-wide {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; position: relative; overflow: hidden;
  }
  .card-title {
    font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 2px;
    color: var(--cyan); margin-bottom: 20px; text-transform: uppercase;
  }

  /* --- TABLE STYLING --- */
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { 
    font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,0.4); text-transform: uppercase; padding: 15px 10px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 15px 10px; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:hover td { background: rgba(0,245,255,0.05); }
  
  .highlight-red { color: var(--red); font-weight: bold; text-shadow: 0 0 10px rgba(255,45,85,0.4); }
  .highlight-cyan { color: var(--cyan); font-weight: bold; }
  
  #noDataMsg { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; font-style: italic; }

/* --- EYE BUTTON & MODAL STYLING --- */
  .eye-btn {
    background: rgba(0, 245, 255, 0.1);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .eye-btn:hover { background: var(--cyan); color: var(--dark); box-shadow: 0 0 10px var(--cyan); }
  .eye-btn svg { width: 16px; height: 16px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(2, 12, 20, 0.9); backdrop-filter: blur(5px);
    z-index: 9999; display: none; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.3s;
  }
  .modal-overlay.show { display: flex; opacity: 1; }
  
  .modal-content {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; width: 800px; max-width: 90vw; max-height: 90vh;
    display: flex; flex-direction: column; gap: 15px;
    box-shadow: 0 0 40px rgba(0, 245, 255, 0.1);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-family: 'Orbitron', monospace; color: var(--cyan); font-size: 16px; letter-spacing: 2px; }
  .close-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: color 0.3s; }
  .close-btn:hover { color: var(--red); }
  
  #modalImg { width: 100%; height: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); min-height: 200px; object-fit: contain; color: rgba(255,255,255,0.4); text-align: center; line-height: 200px;}

</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="scanlines"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  
  <div class="header">
    <h1>Patient <span>History</span></h1>
    <a href="index.html" class="nav-btn">← LIVE DASHBOARD</a>
  </div>

  <div class="controls">
    <label for="userSelect">SELECT PATIENT:</label>
    <select id="userSelect">
      <option value="">Loading users...</option>
    </select>
  </div>

  <div class="card-wide">
    <div class="card-title">BPM & Dry Eye Events Over Time</div>
    <div style="height: 300px; width: 100%;">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <div class="card-wide">
    <div class="card-title">Session Logs</div>
    <table id="historyTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Duration (Min)</th>
          <th>Total Blinks</th>
          <th>Avg BPM</th>
          <th>Dry Eye Events</th>
          <th>Avg Temp (°C)</th>
          <th>Avg Humid (%)</th>
          <th>Plot</th> </tr>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
    <div id="noDataMsg">Select a patient to view history.</div>
  </div>

</div>

</div> <div id="graphModal" class="modal-overlay" onclick="closeGraphModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Session Graph</h3>
        <button class="close-btn" onclick="closeGraphModal()">✕</button>
      </div>
      <img id="modalImg" src="" alt="Session Graph" onerror="this.src=''; this.alt='Graph file not found on local computer.';">
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5ft5TLizM6QqTbqVJxRcqUirGhLxRl68",
  authDomain: "dry-eyes-detection.firebaseapp.com",
  databaseURL: "https://dry-eyes-detection-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dry-eyes-detection",
  storageBucket: "dry-eyes-detection.firebasestorage.app",
  messagingSenderId: "182409923761",
  appId: "1:182409923761:web:d5852cdac2d25e6af3a690"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myChart = null; // Holds the graph instance

// 1. Fetch Users on Load
const userSelect = document.getElementById("userSelect");
const dbRef = ref(db, 'user_history');

onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  userSelect.innerHTML = '<option value="">-- Choose a Patient --</option>'; // Reset
  
  if (data) {
    const users = Object.keys(data);
    users.forEach(user => {
      const opt = document.createElement("option");
      opt.value = user;
      opt.textContent = user;
      userSelect.appendChild(opt);
    });
  } else {
    userSelect.innerHTML = '<option value="">No history found yet</option>';
  }
});

// 2. When a user is selected, load their table and graph!
userSelect.addEventListener("change", (e) => {
  const selectedUser = e.target.value;
  const tbody = document.getElementById("tableBody");
  const noData = document.getElementById("noDataMsg");
  
  tbody.innerHTML = ""; // Clear table
  
  if (!selectedUser) {
    noData.style.display = "block";
    if(myChart) myChart.destroy();
    return;
  }
  
  noData.style.display = "none";

  get(ref(db, `user_history/${selectedUser}`)).then((snapshot) => {
    if (snapshot.exists()) {
      const sessions = snapshot.val();
      
      // Arrays to hold data for the graph
      const labels = [];
      const bpmData = [];
      const dryEventsData = [];

      // Loop through all sessions for this user
      Object.keys(sessions).forEach(sessionKey => {
        const s = sessions[sessionKey];
        
        // Add to Graph Data
        labels.push(`${s.date} ${s.time}`);
        bpmData.push(s.avg_bpm);
        dryEventsData.push(s.dry_eye_events);

// Extract the session number (e.g., from "session_1" we get "1")
        const sessionNumber = sessionKey.split('_')[1];
        // Build the exact file path to match your Python output
        const safeName = selectedUser.replace(/ /g, "_");
        const cacheBuster = new Date().getTime();
        const imagePath = `../user_graphs/${safeName}_${sessionNumber}.png?v=${cacheBuster}`;

        // Add to HTML Table
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${s.date}</td>
          <td>${s.time}</td>
          <td>${s.duration_minutes}</td>
          <td class="highlight-cyan">${s.total_blinks}</td>
          <td>${s.avg_bpm}</td>
          <td class="${s.dry_eye_events > 0 ? 'highlight-red' : ''}">${s.dry_eye_events}</td>
          <td>${s.avg_temp || '--'}</td>
          <td>${s.avg_humidity || '--'}</td>
          <td>
            <button class="eye-btn" onclick="openGraphModal('${imagePath}', 'Session ${sessionNumber}')" title="View Graph">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Update the Graph
      updateGraph(selectedUser, labels, bpmData, dryEventsData);
    }
  });
});

// 3. Render the Chart.js Graph
function updateGraph(userName, labels, bpmData, dryEventsData) {
  const ctx = document.getElementById('historyChart').getContext('2d');
  
  if(myChart) myChart.destroy(); // Destroy old graph before making a new one

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Average BPM',
          data: bpmData,
          borderColor: '#00f5ff',
          backgroundColor: 'rgba(0, 245, 255, 0.1)',
          tension: 0.3,
          fill: true
        },
        {
          label: 'Dry Eye Events',
          data: dryEventsData,
          borderColor: '#ff2d55',
          backgroundColor: 'rgba(255, 45, 85, 0.1)',
          tension: 0.3,
          fill: true,
          yAxisID: 'y1' // Put this on a separate axis scale
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: 'white', font: { family: 'Rajdhani' } } }
      },
      scales: {
        x: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { 
          title: { display: true, text: 'Blinks per Min (BPM)', color: '#00f5ff' },
          ticks: { color: '#00f5ff' }, grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y1: {
          position: 'right',
          title: { display: true, text: 'Dry Eye Events', color: '#ff2d55' },
          // FIX: Added precision: 0 to force whole numbers only
          ticks: { color: '#ff2d55', stepSize: 1, precision: 0 }, 
          grid: { drawOnChartArea: false }
        }
      }
    }
  });
}

// Global functions to open/close the modal
window.openGraphModal = function(imgSrc, title) {
  document.getElementById('modalTitle').textContent = title + " - " + imgSrc.split('/')[1];
  document.getElementById('modalImg').src = imgSrc;
  const modal = document.getElementById('graphModal');
  modal.classList.add('show');
};

window.closeGraphModal = function() {
  document.getElementById('graphModal').classList.remove('show');
  setTimeout(() => document.getElementById('modalImg').src = "", 300); // clear after closing
};

</script>

</body>
</html>
